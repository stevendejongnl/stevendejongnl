name: Waka Readme

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKAPI_API_KEY }}
          API_BASE_URL: https://wakapi.madebysteven.nl/api/compat/wakatime/v1
          SHOW_TITLE: "true"
          BLOCKS: ░▒▓█
          TIME_RANGE: last_7_days
          SHOW_TIME: "true"
